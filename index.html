<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <header class="header">
                <h1>My Tasks</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <span class="stat-item">
                    <strong id="totalTasks">0</strong> Total
                </span>
                <span class="stat-item">
                    <strong id="activeTasks">0</strong> Active
                </span>
                <span class="stat-item">
                    <strong id="completedTasks">0</strong> Completed
                </span>
            </div>

            <div id="todoList" class="todo-list"></div>

            <div class="empty-state" id="emptyState">
                <p>📝 No tasks yet. Add one to get started!</p>
            </div>

            <div class="actions">
                <button id="clearCompleted" class="btn-clear">Clear Completed</button>
                <button id="clearAll" class="btn-danger">Delete All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
